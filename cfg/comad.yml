dataset: 'comad'
seed: 42
t_his: 15
t_pred: 15
batch_size: 64
eval_batch_size: 256
num_epoch: 100
milestone: [20, 40, 60, 80, 100]
save_model_interval: 20
num_data_sample: 50000
num_val_data_sample: 5000
lr: 3.e-4

n_pre: 20
multimodal_path: '/data/user/qkh/datasets/CoMad/multimodal/t_his15_comad_p1_p2_robot_thre0.050_t_pred15_thre0.100_filtered.npz'
data_candi_path: '/data/user/qkh/datasets/CoMad/multimodal/data_candi_comad_p1_p2_robot_t_his15_t_pred15_skiprate20.npz'
padding: 'LastFrame'
Complete: True
noise_steps: 1000
ddim_timesteps: 100
scheduler: 'Cosine'
model_variant: 'two_stage'
stage1_num_layers: 2
dit_attn_mode: 'spatio_temporal'  # 'spatio_temporal' or 'self_attention'
num_layers: 9
num_heads: 8
latent_dims: 512
dropout: 0.2

# modulation settings
mod_train: 0.9
mod_test: 1.0
dct_norm_enable: False
disable_tensorboard: True
use_data_aug: True
aug_rotate_prob: 0.5
aug_reverse_prob: 0.2
use_velocity_input: False
velocity_loss_weight: 0.0

# visualization settings
vis_azim: 0.0
vis_elev: 15.0
vis_axis_radius: 2.5
vis_size: 3.0
vis_dpi: 80
vis_auto_axis: True
vis_axis_padding: 0.25
vis_line_width: 1.5
vis_title_fontsize: 16
vis_output_only: True

# CoMad specific settings
include_person2: True
include_robot: True
predict_human_only: True
# Test / val / pred / multimodal eval only (train split unchanged). Paths: test/<action>/<HH|HR>/<id>/...
# 'all' | 'HR' | 'HH' | 'HR HH' | [HR, HH] — set HR for faster smoke eval on human-robot episodes only.
comad_test_interactions: HR
# Pred GIF: InteRACT interact/utils/comad_hr.py Motive fix (-x, z, y). Try false for HH-only quirks.
comad_motive_to_interact_axes: true

# Scene-wise condition control
# HR scenes -> use robot joints as condition
use_hr_robot_condition: True
# HH scenes -> use Person_2 joints as condition
use_hh_human_condition: True

data_path: '/data/user/qkh/datasets/CoMad'
