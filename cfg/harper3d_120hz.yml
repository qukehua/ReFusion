dataset: 'harper3d'
# 120hz: 100帧 = 0.83秒历史, 400帧 = 3.33秒预测 (与30hz时间等效)
t_his: 100
t_pred: 400
batch_size: 32  # 降低batch_size因为序列更长
num_epoch: 500
milestone: [100,200,300,400,500]
save_model_interval: 100
num_data_sample: 50000
num_val_data_sample: 5000
lr: 3.e-4
n_pre: 50  # 增加DCT系数数量以适应更长序列
# Set to 'auto' to auto-construct based on fps
multimodal_path: '/data3/user/qkh/DATASET/TransFusion/HARPER/t_his100_120hz_thre0.500_t_pred400_thre0.100_filtered.npz'
data_candi_path: '/data3/user/qkh/DATASET/TransFusion/HARPER/data_candi_120hz_t_his100_t_pred400_skiprate50.npz'
padding: 'LastFrame'
Complete: True
noise_steps: 1000
ddim_timesteps: 100
scheduler: 'Cosine'
num_layers: 9
num_heads: 8
latent_dims: 512
dropout: 0.2
mod_train: 0.8
mod_test: 1.0
dct_norm_enable: False
disable_tensorboard: True
# Harper3D specific settings
data_path: '/data3/user/qkh/HARPER/HARPER _3D panoptic'
include_spot: True
use_spot_condition: True
predict_human_only: True
fps: '120hz'

