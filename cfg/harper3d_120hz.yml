dataset: 'harper3d'
seed: 42
# 120hz: 100 frames = 0.83 seconds history, 400 frames = 3.33 seconds prediction (equivalent to 30hz)
t_his: 100
t_pred: 400
batch_size: 32  # decrease batch_size because the sequence is longer
eval_batch_size: 16  # chunked eval to avoid OOM during DDIM sampling
num_epoch: 100
# scaled from [100, 200, 300, 400, 500] for a 101-epoch run
milestone: [20, 40, 60, 80, 100]
save_model_interval: 20
num_data_sample: 50000
num_val_data_sample: 5000
lr: 3.e-4
n_pre: 50  #dct parameter
# Set to 'auto' to auto-construct based on fps
multimodal_path: '/data/user/qkh/datasets/HARPER/t_his100_120hz_thre0.500_t_pred400_thre0.100_filtered.npz'
data_candi_path: '/data/user/qkh/datasets/HARPER/data_candi_120hz_t_his100_t_pred400_skiprate50.npz'
padding: 'LastFrame'
Complete: True
noise_steps: 1000
ddim_timesteps: 100
scheduler: 'Cosine'
model_variant: 'two_stage'  # 'default' or 'two_stage'
stage1_num_layers: 2  # Stage 1: Block 1-2, Stage 2: Block 3-9
dit_attn_mode: 'spatio_temporal'  # 'spatio_temporal' or 'self_attention'
num_layers: 9
num_heads: 8
latent_dims: 512
dropout: 0.2
# mod_train: 0.9
mod_train: 0.9  # 0.7 for human joints omly  0.9 for human and robots joints
mod_test: 1.0
dct_norm_enable: False
disable_tensorboard: True
use_data_aug: True
aug_rotate_prob: 0.5
aug_reverse_prob: 0.2
use_velocity_input: False  
velocity_loss_weight: 0  #1.e-5
vis_azim: 0.0
vis_elev: 15.0
vis_axis_radius: 2.5
vis_size: 3.0
vis_dpi: 80
vis_auto_axis: True
vis_axis_padding: 0.25
vis_line_width: 1.5
vis_title_fontsize: 16
# Harper3D specific settings
data_path: '/data/user/qkh/datasets/HARPER/HARPER _3D panoptic'
include_spot: False    #human joints omly: False
use_spot_condition: False    #human joints omly: False
predict_human_only: True
fps: '120hz'

