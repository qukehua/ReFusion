dataset: 'cmu_mocap'
seed: 42
t_his: 25
t_pred: 100
batch_size: 32
eval_batch_size: 32
num_epoch: 100
milestone: [20, 40, 60, 80, 100]
save_model_interval: 20
num_data_sample: 50000
num_val_data_sample: 5000
lr: 3.e-4

n_pre: 20
# tuned thresholds for ~20% multimodal windows on test/walking/walking_1:
# thre_his=30, thre_pred=100 -> 2/12 = 16.7%
multimodal_path: '/data/user/qkh/datasets/cmu_mocap/multimodal/t_his25_cmu_mocap_test_walking_walking_1_thre30.000_t_pred100_thre100.000_filtered.npz'
data_candi_path: '/data/user/qkh/datasets/cmu_mocap/multimodal/data_candi_cmu_mocap_test_walking_walking_1_t_his25_t_pred100_skiprate20.npz'
padding: 'LastFrame'
Complete: True
noise_steps: 1000
ddim_timesteps: 100
scheduler: 'Cosine'
model_variant: 'two_stage'
stage1_num_layers: 2
dit_attn_mode: 'spatio_temporal'  # 'spatio_temporal' or 'self_attention'
num_layers: 9
num_heads: 8
latent_dims: 512
dropout: 0.2

# modulation settings
mod_train: 0.9
mod_test: 1.0
dct_norm_enable: False
disable_tensorboard: True
use_data_aug: True
aug_rotate_prob: 0.5
aug_reverse_prob: 0.2
use_velocity_input: False
velocity_loss_weight: 0.0

# visualization settings
vis_azim: 0.0
vis_elev: 15.0
vis_axis_radius: 2.5
vis_size: 3.0
vis_dpi: 80
vis_auto_axis: True
vis_axis_padding: 0.25
vis_line_width: 1.5
vis_title_fontsize: 16

# CMU single-scene setup:
# - keep only one action folder as one scene (walking)
# - keep only one clip id (walking_1)
# - loader generates Person_2 from Person_1 to keep two-character setting.
cmu_scene_filter: 'walking'
cmu_file_filter: 'walking_1'
cmu_total_joint_num: 78

data_path: '/data/user/qkh/datasets/cmu_mocap'
